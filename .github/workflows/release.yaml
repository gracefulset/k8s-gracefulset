name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  packages: write

jobs:
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: pradyumnakashyap
          password: ${{ secrets.DOCKER_SECRET_KEY }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            pradyumnakashyap/gracefulset-controller:${{ steps.version.outputs.VERSION }}
            pradyumnakashyap/gracefulset-controller:latest

  helm:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update chart version and image tag
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION }}/" charts/gracefulset-controller/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.VERSION }}\"/" charts/gracefulset-controller/Chart.yaml
          sed -i "s/^  tag:.*/  tag: \"${{ steps.version.outputs.VERSION }}\"/" charts/gracefulset-controller/values.yaml

      - name: Package Helm chart
        run: |
          helm package charts/gracefulset-controller -d .helm-packages

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update Helm repo index
        run: |
          cp .helm-packages/*.tgz gh-pages/
          helm repo index gh-pages --url https://gracefulset.github.io/k8s-gracefulset

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Release chart ${{ steps.version.outputs.VERSION }}"
          git push

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, helm]
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
