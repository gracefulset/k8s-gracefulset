apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gracefulset-controller
rules:
  - apiGroups: ["apps.infor.com"]
    resources: ["gracefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps.infor.com"]
    resources: ["gracefulsets/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["apps.infor.com"]
    resources: ["gracefulsets/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gracefulset-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gracefulset-controller
subjects:
  - kind: ServiceAccount
    name: gracefulset-controller
    namespace: system
