apiVersion: apps/v1
kind: Deployment
metadata:
  name: gracefulset-controller
  namespace: system
  labels:
    app: gracefulset-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gracefulset-controller
  template:
    metadata:
      labels:
        app: gracefulset-controller
    spec:
      serviceAccountName: gracefulset-controller
      containers:
        - name: manager
          image: gracefulset-controller:latest
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gracefulset-controller
  namespace: system
